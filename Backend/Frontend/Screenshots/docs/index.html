<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Content Generator</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, sans-serif;
            background:linear-gradient(to right,#141e30,#243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;

        }

        .dark{

            background:black;
            color:white;

        }

        .container{

            width:900px;
            background:white;
            border-radius:20px;
            padding:30px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
            transition:0.3s;

        }

        .container:hover{

            transform:scale(1.01);

        }

        .logo{

            text-align:center;
            margin-bottom:15px;

        }

        .logo img{

            width:80px;

        }

        h1{

            text-align:center;
            color:#243b55;
            margin-bottom:10px;

        }

        .subtitle{

            text-align:center;
            color:gray;
            margin-bottom:25px;

        }

        .top-buttons{

            display:flex;
            justify-content:flex-end;
            margin-bottom:20px;

        }

        .search-box{

            display:flex;
            gap:10px;

        }

        input{

            flex:1;
            padding:15px;
            border-radius:10px;
            border:1px solid gray;
            font-size:16px;

        }

        button{

            padding:15px 25px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;

        }

        button:hover{

            background:#0056b3;
            transform:scale(1.05);

        }

        .stats{

            display:flex;
            gap:15px;
            margin-top:25px;

        }

        .stat-card{

            flex:1;
            padding:20px;
            color:white;
            border-radius:10px;
            text-align:center;

        }

        .blue{

            background:#007bff;

        }

        .green{

            background:#28a745;

        }

        .features{

            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
            margin-top:25px;

        }

        .feature-card{

            background:#f5f5f5;
            padding:20px;
            border-radius:10px;
            text-align:center;
            font-weight:bold;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);

        }

        #time{

            margin-top:20px;
            font-weight:bold;
            color:#243b55;

        }

        h3{

            margin-top:25px;
            color:#243b55;

        }

        ul{

            margin-left:20px;
            margin-top:10px;

        }

        .result{

            margin-top:25px;
            background:#f5f5f5;
            padding:20px;
            border-radius:15px;
            animation:fadeIn 0.5s;

        }

        @keyframes fadeIn{

            from{

                opacity:0;
                transform:translateY(20px);

            }

            to{

                opacity:1;
                transform:translateY(0px);

            }

        }

        .image-box{

            margin-top:15px;
            text-align:center;

        }

        .image-box img{

            width:100%;
            max-width:500px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);

        }

        .loader{

            border:6px solid #f3f3f3;
            border-top:6px solid #007bff;
            border-radius:50%;
            width:40px;
            height:40px;
            animation:spin 1s linear infinite;
            margin:auto;

        }

        @keyframes spin{

            100%{

                transform:rotate(360deg);

            }

        }

        .seo-tag{

            display:inline-block;
            background:#007bff;
            color:white;
            padding:8px 12px;
            margin:5px;
            border-radius:20px;
            font-size:14px;

        }

        footer{

            text-align:center;
            margin-top:25px;
            color:gray;

        }

    </style>

</head>

<body>

<div class="container">

    <div class="top-buttons">

        <button onclick="toggleTheme()">
            Toggle Theme
        </button>

    </div>

    <div class="logo">

        <img
        src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

    </div>

    <h1>AI Content Generator</h1>

    <p class="subtitle">

        Generate blogs, tweets, SEO tags and AI content instantly.

    </p>

    <div class="search-box">

        <input
        type="text"
        id="topic"
        placeholder="Enter Topic">

        <button onclick="generateContent()">
            Generate
        </button>

    </div>

    <div class="stats">

        <div class="stat-card blue">

            <h2>100+</h2>
            <p>Blogs Generated</p>

        </div>

        <div class="stat-card green">

            <h2>50+</h2>
            <p>Topics Covered</p>

        </div>

    </div>

    <div class="features">

        <div class="feature-card">
            Blog Generator
        </div>

        <div class="feature-card">
            Tweet Generator
        </div>

        <div class="feature-card">
            SEO Tag Generator
        </div>

        <div class="feature-card">
            AI Image Generator
        </div>

    </div>

    <div id="time"></div>

    <h3>Recent Topics</h3>

    <ul id="history"></ul>

    <div class="result" id="result">

        <div id="loading" style="display:none;">

            <div class="loader"></div>

        </div>

    </div>

    <footer>

        AI Content Generator © 2026

    </footer>

</div>

<script>

async function generateContent(){

    const topic =
        document.getElementById("topic").value;

    if(topic===""){

        alert("Please enter a topic");

        return;

    }

    document.getElementById("loading")
    .style.display = "block";

    const response = await fetch(

        `http://127.0.0.1:8000/generate/${topic}`

    );

    const data = await response.json();

    document.getElementById("loading")
    .style.display = "none";

    const history =
        document.getElementById("history");

    history.innerHTML +=
        `<li>${topic}</li>`;

    document.getElementById("result")
    .innerHTML = `

        <h2>Blog</h2>

        <p id="blogText"></p>

        <h2 style="margin-top:20px;">
            Tweets
        </h2>

        <ul>

            ${data.tweets.map(tweet =>

                `<li>${tweet}</li>`

            ).join("")}

        </ul>

        <h2 style="margin-top:20px;">
            SEO Tags
        </h2>

        <div>

            ${data.seo_tags.map(tag =>

                `<span class="seo-tag">

                    ${tag}

                </span>`

            ).join("")}

        </div>

        <br>

        <button onclick="copyContent()">
            Copy Content
        </button>

        <button onclick="downloadContent()">
            Download Content
        </button>

        <h2 style="margin-top:20px;">
            AI Image
        </h2>

        <div class="image-box">

            <img
            src="${data.image}">

        </div>

    `;

    let text = data.blog;

    let i = 0;

    document.getElementById("blogText")
    .innerHTML = "";

    let typing = setInterval(()=>{

        if(i < text.length){

            document.getElementById("blogText")
            .innerHTML += text.charAt(i);

            i++;

        }
        else{

            clearInterval(typing);

        }

    },20);

}

function downloadContent(){

    const content =
        document.getElementById("result")
        .innerText;

    const blob = new Blob(

        [content],

        {type:"text/plain"}

    );

    const link =
        document.createElement("a");

    link.href =
        URL.createObjectURL(blob);

    link.download = "AI_Content.txt";

    link.click();

}

function copyContent(){

    const content =
        document.getElementById("result")
        .innerText;

    navigator.clipboard
    .writeText(content);

    alert("Content Copied!");

}

function toggleTheme(){

    document.body
    .classList.toggle("dark");

}

document
.getElementById("topic")
.addEventListener("keypress",

function(e){

    if(e.key==="Enter"){

        generateContent();

    }

});

setInterval(()=>{

    document.getElementById("time")
    .innerHTML =

    "Current Time: " +

    new Date().toLocaleTimeString();

},1000);

</script>

</body>

</html>
